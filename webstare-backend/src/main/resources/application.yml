server:
  port: 8080

spring:
  application:
    name: webstare-backend
  profiles:
    active: dev

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/webstare?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root123456

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.webstare.backend.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 自定义配置
webstare:
  jwt:
    secret: webstare-secret-key-2026-very-long-secret-key-for-jwt-token-generation
    expiration: 86400000
  ai:
    service:
      url: http://localhost:5000
