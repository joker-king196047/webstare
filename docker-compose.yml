version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: webstare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: webstare
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./webstare-backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    networks:
      - webstare-network

  redis:
    image: redis:7-alpine
    container_name: webstare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - webstare-network

volumes:
  mysql-data:
  redis-data:

networks:
  webstare-network:
    driver: bridge
